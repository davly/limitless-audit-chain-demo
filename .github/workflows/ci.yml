name: CI

# R142 pure-Go CI for limitless-audit-chain-demo -- canonical 1st
# saturator of R-CROSS-INFRA-AUDIT-CHAIN-EMIT. Pure-Go CLI + 8
# internal packages (chain + emitters + lore + mirrormark + manifest
# + honest + firewall + legal). go.mod: github.com/davly/limitless-
# audit-chain-demo / go 1.22. Zero runtime dependencies at I20 ship.
#
# Cohort-port FROM INCEPTION per R174 5-of-5 strict (memoria +
# conjure + bias-audit precedent).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./... -count=1
      - name: go vet
        run: go vet ./...

  go-security:
    # R142 gating mirror for Go -- gosec (SAST) + govulncheck (CVE).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gosec SAST
        run: gosec -severity medium ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...
